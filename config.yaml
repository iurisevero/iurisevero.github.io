  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/formatura.png"
    content: |-
      Software Engineer with a degree from the University of Brasília, focused on **full-stack development** and **cloud infrastructure**. I worked as a Full Stack Engineer at **External Secrets Inc.**, building backend services with Python and Go, Kubernetes controllers, and web UIs with React and TypeScript. I also worked at ANTAQ, where I developed internal systems. I've participated in several Programming Marathons, many Game Jams, and even tried building an MMO with some friends (yeah, a bit of a crazy idea… we definitely bit off more than we could chew, but who knows, maybe one day it'll happen?).

      Ever since I can remember, I've been passionate about games, whether on PC, console, or mobile, and I've always admired the influence they have on players and the emotions they spark. My goal is to one day **create games that bring this same passion to others**, games that captivate players just as much as I was when I played The Legend of Zelda: Ocarina of Time for the first time.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Go"
        - "React"
        - "Unity3d"
        - "Python"
        - "TypeScript"
        - "C#"
        - "MongoDB"
        - "Tailwind"
        - "Git"
        - "Docker"
        - "Kubernetes"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - job: "Full Stack Engineer"
        company: "External Secrets Inc"
        companyUrl: "https://www.externalsecrets.com/"
        date: "Nov 2024 - Nov 2025"
        content: |
          - Developed web user interfaces for the company's services using React, TypeScript, and Tailwind CSS.
          - Developed a secrets auditing and analysis platform using Python (FastAPI) and MongoDB.
          - Led the development of audit policies, with custom REGO rules, and webhooks triggering defined by policy compliance conditions.
          - Developed a dynamic credentials system for Kubernetes, issuing secrets at pod startup and revoking them on teardown, avoiding secret leakage.
          - Developed a secret-distribution workflow resource on Kubernetes using the External Secrets CRDs. Delivered almost 50% of the feature tasks.
          - Contributed to the External Secrets Operator (open source), implementing bug fixes and new generators.


      - job: "Full Stack Developer"
        company: "National Waterway Transport Agency"
        companyUrl: "https://www.gov.br/antaq/pt-br"
        date: "Nov 2023 - Oct 2024"
        content: |
          - Developed a system for risk management using Oracle APEX and PL/SQL.
          - Participated in the elicitation and documentation of requirements for the ships, boats and ports registration and management system.
          - Implemented functions to enable a self-updating database by integrating data from external APIs.


      - job: "Founder | Game Developer"
        company: "Mach874k"
        companyUrl: "https://mach874k.com/"
        date: "Dec 2019 - Nov 2022"
        content: |
          Game developer specializing in Unity
          - Worked across multiple areas of game development, with a strong focus on Unity for projects such as Reality RPG, a 3D multiplayer mobile RPG, and Critalia, a 2D singleplayer metroidvania.
          - Developed APIs written in Python and Go and integrated them to Unity.
          - Managed cloud infrastructure using Kubernetes and Google Kubernetes Engine (GKE).


      - job: "Project Development Manager"
        company: Orcestra Gamificacao
        companyUrl: "https://orcestra.com.br"
        date: "Feb 2020 - Oct 2020"
        content: |
          - Led a team of four developers building a gamified mobile application.
          - Developed frontend using React Native.
          - Built backend REST API with Flask, integrating client database to PostgreSQL.

