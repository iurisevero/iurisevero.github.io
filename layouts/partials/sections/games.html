{{ if .Site.Params.games.enable | default false }}
<section id="games" class="py-5">
    <div class="container">
        <h3 class="text-center">{{ .Site.Params.games.title | default "Games" }}</h3>
        <div class="py-4">
            {{ partial "carousel-section.html" (dict "items" .Site.Params.games.items "sectionId" "games" "showBadges" true) }}
        </div>
    </div>
</section>
{{ end }}
